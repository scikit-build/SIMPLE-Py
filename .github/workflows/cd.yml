name: deploy-book

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0

      - name: Build the book
        run: uvx jupyter-book build --html
        env:
          BASE_URL: /SIMPLE-Py

      - uses: actions/upload-artifact@v7
        with:
          name: jupyterbook
          path: _build/html/*

  build-slides:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Make slides
        run: npx @marp-team/marp-cli@latest --input-dir slides --output _output

      - uses: actions/upload-artifact@v7
        with:
          name: slides
          path: _output/*

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [build-book, build-slides]
    if: github.event_name == 'push'
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v6

      - uses: actions/download-artifact@v8
        with:
          name: jupyterbook
          path: public

      - uses: actions/download-artifact@v8
        with:
          name: slides
          path: public/slides

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
